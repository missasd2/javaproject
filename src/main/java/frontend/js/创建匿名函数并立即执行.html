<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script>
        function count() {
            var arr = [];
            // 创建一个匿名函数并立即执行
            // (function (x) { return x * x }) (3);
            // 方法是再创建一个函数，用该函数的参数绑定循环变量当前的值，
            // 无论该循环变量后续如何更改，已绑定到函数参数的值不变：
            for (var i = 0; i <= 3 ; i++) {
                arr.push((function (n) {
                    return function () {
                        return n * n;
                    }
                })(i));
            }
            return arr;

        }
        var results = count();
        var f1 = results[0];
        var f2 = results[1];
        var f3 = results[2];
        console.log(f1()); // 0
        console.log(f2()); // 1
        console.log(f3()); // 4
    </script>
</head>
<body>

</body>
</html>
